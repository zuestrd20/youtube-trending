<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Trending Videos - Taiwan & US</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .update-info {
            font-size: 1.1em;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .region-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .region-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        
        .region-header h2 {
            font-size: 2em;
            color: #667eea;
            margin-left: 15px;
        }
        
        .flag {
            font-size: 2.5em;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .video-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 aspect ratio */
            background: #000;
            overflow: hidden;
        }
        
        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .video-card:hover .play-overlay {
            opacity: 1;
        }
        
        .play-icon {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #667eea;
            margin-left: 5px;
        }
        
        .video-info {
            padding: 15px;
        }
        
        .video-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-channel {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }
        
        .video-stats {
            display: flex;
            gap: 15px;
            font-size: 0.8em;
            color: #999;
        }
        
        .video-stats-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌎 YouTube Trending Videos</h1>
            <div class="update-info">
                Last Updated: March 18, 2026 | Execution #49
            </div>
        </header>
        
        <div class="region-section">
            <div class="region-header">
                <span class="flag">🇹🇼</span>
                <h2>Taiwan</h2>
            </div>
            <div class="video-grid" id="tw-grid">
                <!-- Tw videos will be loaded here -->
            </div>
        </div>
        
        <div class="region-section">
            <div class="region-header">
                <span class="flag">🇺🇸</span>
                <h2>United States</h2>
            </div>
            <div class="video-grid" id="us-grid">
                <!-- US videos will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        async function loadTrendingVideos() {
            try {
                const response = await fetch('trending.json');
                const data = await response.json();
                
                if (data.regions.TW) {
                    renderVideos(data.regions.TW, 'tw-grid');
                }
                
                if (data.regions.US) {
                    renderVideos(data.regions.US, 'us-grid');
                }
            } catch (error) {
                console.error('Error loading trending videos:', error);
            }
        }
        
        function renderVideos(videos, containerId) {
            const container = document.getElementById(containerId);
            
            videos.forEach(video => {
                const videoCard = document.createElement('div');
                videoCard.className = 'video-card';
                videoCard.onclick = () => window.open(video.url, '_blank');
                
                videoCard.innerHTML = `
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}">
                        <div class="play-overlay">
                            <div class="play-icon"></div>
                        </div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="video-channel">${video.channel}</div>
                        <div class="video-stats">
                            ${video.viewCount > 0 ? `<div class="video-stats-item">⏰ ${formatCount(video.viewCount)} views</div>` : ''}
                            ${video.likeCount > 0 ? `<div class="video-stats-item">❤ ${formatCount(video.likeCount)}</div>` : ''}
                        </div>
                    </div>
                `;
                
                container.appendChild(videoCard);
            });
        }
        
        function formatCount(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        loadTrendingVideos();
    </script>
</body>
</html>
