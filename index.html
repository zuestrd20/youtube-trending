<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Trending Videos - TW & US</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .last-updated {
            margin-top: 15px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .notice {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .notice h3 {
            margin-bottom: 10px;
        }
        
        .regions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .region {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .region h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
            font-size: 1.8em;
        }
        
        .region h2::before {
            content: '🌍 ';
            margin-right: 10px;
        }
        
        .video-list {
            list-style: none;
        }
        
        .video-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        
        .video-item:hover {
            background: #e9ecef;
            border-left-color: #667eea;
            transform: translateX(5px);
        }
        
        .video-rank {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            min-width: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-thumbnail {
            flex-shrink: 0;
        }
        
        .video-thumbnail img {
            width: 168px;
            height: 94px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .video-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .video-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #212529;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .video-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .video-title a:hover {
            color: #667eea;
        }
        
        .video-meta {
            font-size: 0.9em;
            color: #6c757d;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .video-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .video-meta span::before {
            content: '•';
            color: #dee2e6;
        }
        
        .video-meta span:first-child::before {
            display: none;
        }
        
        footer {
            text-align: center;
            color: white;
            padding: 30px;
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        footer a {
            color: white;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .regions {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .video-item {
                flex-direction: column;
            }
            
            .video-rank {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 YouTube Trending Videos</h1>
            <div class="subtitle">Taiwan & United States</div>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </header>
        
        <div class="notice" id="notice" style="display: none;">
            <h3>⚠️ Service Notice</h3>
            <p id="noticeText"></p>
        </div>
        
        <div class="regions">
            <div class="region">
                <h2>Taiwan (TW)</h2>
                <ul class="video-list" id="taiwanVideos">
                    <li style="text-align: center; padding: 40px; color: #6c757d;">Loading trending videos...</li>
                </ul>
            </div>
            
            <div class="region">
                <h2>United States (US)</h2>
                <ul class="video-list" id="usVideos">
                    <li style="text-align: center; padding: 40px; color: #6c757d;">Loading trending videos...</li>
                </ul>
            </div>
        </div>
        
        <footer>
            <p>Data refreshed daily at 10:00 UTC</p>
            <p style="margin-top: 10px; font-size: 0.9em;">Execution #51 • Generated by <a href="https://github.com/zuestrd20" target="_blank">@zuestrd20</a></p>
        </footer>
    </div>
    
    <script>
        async function loadTrendingData() {
            try {
                const response = await fetch('trending.json');
                const data = await response.json();
                
                // Update last updated time
                const lastUpdated = new Date(data.last_updated);
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${lastUpdated.toLocaleString()}`;
                
                // Show notice if present
                if (data.note) {
                    document.getElementById('notice').style.display = 'block';
                    document.getElementById('noticeText').textContent = data.note;
                }
                
                // Render Taiwan videos
                renderVideos('taiwanVideos', data.taiwan);
                
                // Render US videos
                renderVideos('usVideos', data.united_states);
                
            } catch (error) {
                console.error('Error loading trending data:', error);
                document.getElementById('taiwanVideos').innerHTML = 
                    '<li style="text-align: center; padding: 40px; color: #dc3545;">Error loading data</li>';
                document.getElementById('usVideos').innerHTML = 
                    '<li style="text-align: center; padding: 40px; color: #dc3545;">Error loading data</li>';
            }
        }
        
        function renderVideos(elementId, videos) {
            const container = document.getElementById(elementId);
            
            if (!videos || videos.length === 0) {
                container.innerHTML = '<li style="text-align: center; padding: 40px; color: #6c757d;">No videos available</li>';
                return;
            }
            
            container.innerHTML = videos.map((video, index) => `
                <li class="video-item">
                    <div class="video-rank">${index + 1}</div>
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
                    </div>
                    <div class="video-info">
                        <div class="video-title">
                            <a href="${video.url}" target="_blank" rel="noopener noreferrer">
                                ${escapeHtml(video.title)}
                            </a>
                        </div>
                        <div class="video-meta">
                            <span>📺 ${escapeHtml(video.channel)}</span>
                            <span>👁️ ${escapeHtml(video.views)}</span>
                            <span>📅 ${escapeHtml(video.published)}</span>
                        </div>
                    </div>
                </li>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load data on page load
        loadTrendingData();
        
        // Refresh every 5 minutes
        setInterval(loadTrendingData, 5 * 60 * 1000);
    </script>
</body>
</html>
