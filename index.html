<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Trending Videos - Taiwan & US</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .update-info {
            font-size: 1.1em;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .region-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .region-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        
        .region-header h2 {
            font-size: 2em;
            color: #667eea;
            margin-left: 15px;
        }
        
        .flag {
            font-size: 2.5em;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .video-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 aspect ratio */
            background: #000;
            overflow: hidden;
        }
        
        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .video-card:hover .play-overlay {
            opacity: 1;
        }
        
        .play-overlay::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 20px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }
        
        .video-info {
            padding: 15px;
        }
        
        .video-title {
            font-size: 1em;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        
        .video-channel {
            font-size: 0.9em;
            color: #606060;
            margin-bottom: 5px;
        }
        
        .video-published {
            font-size: 0.85em;
            color: #909090;
        }
        
        .stats {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 20px;
        }
        
        .stats-content {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
            
            .region-section {
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YouTube Trending Videos</h1>
            <p class="update-info">Last Updated: <span id="lastUpdate"></span></p>
            <p class="update-info">Execution #<span id="execution"></span></p>
        </header>
        
        <div class="region-section">
            <div class="region-header">
                <span class="flag">🇹🇼</span>
                <h2>Taiwan Trending</h2>
            </div>
            <div class="video-grid" id="tw-videos"></div>
        </div>
        
        <div class="region-section">
            <div class="region-header">
                <span class="flag">🇺🇸</span>
                <h2>United States Trending</h2>
            </div>
            <div class="video-grid" id="us-videos"></div>
        </div>
        
        <div class="stats">
            <div class="stats-content">
                <div class="stat-item">
                    <span class="stat-number" id="tw-count">0</span>
                    <span class="stat-label">Taiwan Videos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="us-count">0</span>
                    <span class="stat-label">US Videos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="total-count">0</span>
                    <span class="stat-label">Total Videos</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Format date function
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffMonths = Math.floor(diffDays / 30);
            const diffYears = Math.floor(diffDays / 365);
            
            if (diffYears > 0) {
                return `${diffYears} year${diffYears > 1 ? 's' : ''} ago`;
            } else if (diffMonths > 0) {
                return `${diffMonths} month${diffMonths > 1 ? 's' : ''} ago`;
            } else if (diffDays > 0) {
                return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            } else {
                return 'Today';
            }
        }
        
        // Create video card
        function createVideoCard(video) {
            return `
                <a href="${video.url}" target="_blank" class="video-card" style="text-decoration: none;">
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <div class="play-overlay"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-channel">${video.channel}</div>
                        <div class="video-published">${formatDate(video.published)}</div>
                    </div>
                </a>
            `;
        }
        
        // Load and display videos
        fetch('trending.json')
            .then(response => response.json())
            .then(data => {
                // Update header info
                document.getElementById('lastUpdate').textContent = new Date(data.lastUpdated).toLocaleString();
                document.getElementById('execution').textContent = data.execution;
                
                // Display Taiwan videos
                const twContainer = document.getElementById('tw-videos');
                data.regions.TW.forEach(video => {
                    twContainer.innerHTML += createVideoCard(video);
                });
                
                // Display US videos
                const usContainer = document.getElementById('us-videos');
                data.regions.US.forEach(video => {
                    usContainer.innerHTML += createVideoCard(video);
                });
                
                // Update stats
                document.getElementById('tw-count').textContent = data.regions.TW.length;
                document.getElementById('us-count').textContent = data.regions.US.length;
                document.getElementById('total-count').textContent = data.regions.TW.length + data.regions.US.length;
            })
            .catch(error => {
                console.error('Error loading trending videos:', error);
                document.querySelector('.container').innerHTML = `
                    <header>
                        <h1>Error Loading Videos</h1>
                        <p>Please try again later.</p>
                    </header>
                `;
            });
    </script>
</body>
</html>
